<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>学生信息管理</title>
  <link rel="stylesheet" href="css/index.css" />
</head>

<body>
  <h1>新增学员</h1>
  <form class="info" autocomplete="off">
    姓名：<input type="text" class="uname" name="uname" />
    年龄：<input type="text" class="age" name="age" />
    性别:
    <select name="gender" class="gender">
      <option value="男">男</option>
      <option value="女">女</option>
    </select>
    薪资：<input type="text" class="salary" name="salary" />
    就业城市：<select name="city" class="city">
      <option value="北京">北京</option>
      <option value="上海">上海</option>
      <option value="广州">广州</option>
      <option value="深圳">深圳</option>
      <option value="曹县">曹县</option>
    </select>
    <button class="add">录入</button>
  </form>

  <h1>就业榜</h1>
  <table>
    <thead>
      <tr>
        <th>学号</th>
        <th>姓名</th>
        <th>年龄</th>
        <th>性别</th>
        <th>薪资</th>
        <th>就业城市</th>
        <th>录入时间</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody class="tbody">
      <!-- 
        <tr>
          <td>1001</td>
          <td>欧阳霸天</td>
          <td>19</td>
          <td>男</td>
          <td>15000</td>
          <td>上海</td>
          <td>
            <a href="javascript:">删除</a>
          </td>
        </tr> 
        -->
    </tbody>
  </table>
  <script>

    const uname = document.querySelector('.uname')
    const age = document.querySelector('.age')
    const gender = document.querySelector('.gender')
    const salary = document.querySelector('.salary')
    const city = document.querySelector('.city')

    const form = document.querySelector('.info')

    const STORAGE_KEY = 'studentsData'
    // 从 localStorage 获取数据，如果没有则初始化为空数组
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')

    const tbody = document.querySelector('.tbody')

    renderTable()

    form.addEventListener('submit', function (e) {
      e.preventDefault()

      const unameVal = uname.value.trim()
      const ageVal = age.value.trim()
      const salaryVal = salary.value.trim()
      const genderVal = gender.value
      const cityVal = city.value

      // 1. 非空
      if (!unameVal || !ageVal || !salaryVal || !genderVal || !cityVal) {
        return alert('请完整填写所有字段')
      }

      // 2. 姓名：1-20字符（中文/字母/数字/下划线）
      if (!/^[\u4e00-\u9fa5A-Za-z0-9_]{1,20}$/.test(unameVal)) {
        return alert('姓名格式不正确，限制1~20个字符（中文、字母、数字、下划线）')
      }

      // 3. 年龄：整数且范围16~60（可改）
      if (!/^\d+$/.test(ageVal)) {
        return alert('年龄请填写整数')
      }
      const ageNum = Number(ageVal)
      if (ageNum < 16 || ageNum > 60) {
        return alert('年龄范围应在16~60之间')
      }

      // 4. 性别：select值校验
      if (!['男', '女'].includes(genderVal)) {
        return alert('性别不合法')
      }

      // 5. 薪资：数字且大于0
      const salaryNum = Number(salaryVal)
      if (Number.isNaN(salaryNum) || salaryNum <= 0) {
        return alert('薪资必须填写有效正数')
      }

      // 6. 城市：从下拉选项内
      const validCities = ['北京', '上海', '广州', '深圳', '曹县']
      if (!validCities.includes(cityVal)) {
        return alert('请选择有效就业城市')
      }

      const initData = {
        stuId: data.length + 1,
        uname: unameVal,
        age: ageNum,
        gender: genderVal,
        salary: salaryNum,
        city: cityVal,
        createTime: new Date().toLocaleString() 
      }
      data.push(initData)
      // 添加数据后更新 localStorage
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
      form.reset()
      renderTable()


    })

    function renderTable() {
      tbody.innerHTML = ''

      //map(function(){   })
      //map(function(ele ,index)) ele 当前原神属性，index当前元素索引，列表渲染用数组.map(function(ele){return `  html内容`})
      const newarr = data.map(function (ele,index) {

        return `
        <tr>
          <td>${ele.stuId}</td>
          <td>${ele.uname}</td>
          <td>${ele.age}</td>
          <td>${ele.gender}</td>
          <td>${ele.salary}</td>
          <td>${ele.city}</td>
          <td>${ele.createTime}</td>

          <td>
           <a href="javascript:" class="del" data-id="${index}">删除</a>
          </td>
        </tr> 
        `
      })

      console.log(newarr)
      tbody.innerHTML = newarr.join('')


      // for (let i = 0; i < data.length; i++) {
      //   const tr = document.createElement('tr')
      //   tr.innerHTML = `
      //     <td>${data[i].stuId}</td>
      //     <td>${data[i].uname}</td>
      //     <td>${data[i].age}</td>
      //     <td>${data[i].gender}</td>
      //     <td>${data[i].salary}</td>
      //     <td>${data[i].city}</td>
      //     <td>
      //        <a href="javascript:" class="del" data-id="${i}">删除</a>
      //     </td>`
      //   tbody.appendChild(tr)

      // }
    }

    tbody.addEventListener('click', function (e) {
      if (e.target.tagName === 'A') {
        data.splice(e.target.dataset.id, 1)
        data.forEach((item, idx) => item.stuId = idx + 1)
        // 删除数据后更新 localStorage
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
      }
      renderTable()

    })
  </script>
</body>

</html>
