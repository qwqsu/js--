<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>

<body>

</body>
<script>
	money = 1000
	while (true) {
		let re = +prompt(`
			请输入一个数字：
			1 查询余额
			2 取款
			3 存款
			4 退出`)

		if (re === 4) {
			break
		}

		switch (re) {
			case 1:
				alert(`查询余额${money}元`)
				break
			case 2:
				let qu = +prompt("请输入取款金额")
				if (qu > money) {
					alert('余额不足')
				} else {
					money -= qu
				}
				break
			case 3:
				let cun = +prompt("请输入存款金额")
				money += cun
				break
			default:
				alert('输入有误，请重新输入')
		}
	}
</script>

</html>
